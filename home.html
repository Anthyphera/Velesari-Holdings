<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velesari Holdings | Private Trading House</title>
  <meta name="description" content="Velesari Holdings is a privately funded, privately held private trading house allocating proprietary capital across commodity-linked markets with primary focus on Energy and Agriculture." />
  <meta name="theme-color" content="#071610" />
  <link rel="canonical" href="https://velesari.trade/home.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Velesari Holdings | Private Trading House" />
  <meta property="og:description" content="Proprietary capital allocation across commodity-linked markets with primary focus on Energy and Agriculture." />
  <meta property="og:url" content="https://velesari.trade/home.html" />
  <meta property="og:image" content="./assets/Homepage_ Global Commodity Systems.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Velesari Holdings | Private Trading House" />
  <meta name="twitter:description" content="Privately held trading house focused on Energy systems and agricultural supply chains." />
  <meta name="twitter:image" content="./assets/Homepage_ Global Commodity Systems.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="home">
  <div class="site-shell">
    <div id="siteHeader"></div>

    <main id="mainContent" class="page page-home">
      <section id="hero" class="section hero" aria-labelledby="heroTitle">
        <div class="section-inner hero-layout">
          <div class="hero-copy">
            <p id="heroEyebrow" class="eyebrow" aria-label="Company descriptor"></p>
            <h1 id="heroTitle" class="hero-title"></h1>
            <p id="heroSubtitle" class="hero-subtitle"></p>
            <p id="heroBody" class="hero-body"></p>
            <p id="heroInBrief" class="hero-brief"></p>
            <div id="heroActions" class="hero-actions" aria-label="Primary actions"></div>
          </div>
          <div class="hero-visual" aria-hidden="true">
            <div class="hero-emblem-wrap">
              <img class="hero-emblem" src="./assets/Homepage_ Global Commodity Systems.png" alt="Global commodity systems visualization for Velesari Holdings." loading="eager" decoding="async" />
            </div>
          </div>
        </div>
      </section>

      <section id="domains" class="section" aria-labelledby="domainsTitle">
        <div class="section-inner">
          <div class="section-head">
            <p id="domainsEyebrow" class="eyebrow"></p>
            <h2 id="domainsTitle" class="section-title"></h2>
            <p id="domainsIntro" class="section-intro"></p>
          </div>
          <div id="domainGrid" class="card-grid card-grid-5" role="list" aria-label="Market focus"></div>
        </div>
      </section>

      <section id="revenue" class="section" aria-labelledby="revenueTitle">
        <div class="section-inner">
          <div class="section-head">
            <p id="revenueEyebrow" class="eyebrow"></p>
            <h2 id="revenueTitle" class="section-title"></h2>
            <p id="revenueIntro" class="section-intro"></p>
          </div>
          <div id="revenuePillars" class="card-grid card-grid-3" role="list" aria-label="Operating model"></div>
        </div>
      </section>

      <section id="method" class="section" aria-labelledby="methodTitle">
        <div class="section-inner">
          <div class="section-head">
            <p id="methodEyebrow" class="eyebrow"></p>
            <h2 id="methodTitle" class="section-title"></h2>
            <p id="methodIntro" class="section-intro"></p>
          </div>
          <div id="methodSteps" class="card-grid card-grid-3" role="list" aria-label="Risk and governance"></div>
        </div>
      </section>

      <section class="section section-muted" aria-labelledby="marketVisualsTitle">
        <div class="section-inner">
          <div class="section-head">
            <p class="eyebrow">Market Systems</p>
            <h2 id="marketVisualsTitle" class="section-title">Physical systems and capital discipline</h2>
            <p class="section-intro">Visual modules reserve space for future institutional photography while maintaining a complete operating narrative today.</p>
          </div>
          <div class="visual-two-column">
            <figure class="visual-image visual-image-wide">
              <img
                src="./assets/Home secondary_ Energy Logistics Network.png"
                alt="Energy systems and trade routes visual module."
                loading="lazy"
                decoding="async"
              />
            </figure>
            <figure class="visual-image visual-image-document">
              <img
                src="./assets/Governance_ Disclosure Framework.png"
                alt="Risk governance and capital allocation disclosure panel."
                loading="lazy"
                decoding="async"
              />
            </figure>
          </div>
        </div>
      </section>

      <section id="principles" class="section" aria-labelledby="principlesTitle">
        <div class="section-inner">
          <div class="section-head">
            <p id="principlesEyebrow" class="eyebrow"></p>
            <h2 id="principlesTitle" class="section-title"></h2>
            <p id="principlesIntro" class="section-intro"></p>
          </div>
          <div id="principlesList" class="card-grid card-grid-4" role="list" aria-label="Governance principles"></div>
        </div>
      </section>

      <section id="nameMeaning" class="section" aria-labelledby="nameTitle">
        <div class="section-inner section-inner-narrow">
          <div class="section-head">
            <p id="nameEyebrow" class="eyebrow"></p>
            <h2 id="nameTitle" class="section-title"></h2>
          </div>
          <div class="statement-panel">
            <p id="nameBody" class="statement-copy"></p>
          </div>
        </div>
      </section>

      <section id="proof" class="section" aria-labelledby="proofTitle">
        <div class="section-inner">
          <div class="section-head">
            <p id="proofEyebrow" class="eyebrow"></p>
            <h2 id="proofTitle" class="section-title"></h2>
            <p id="proofIntro" class="section-intro"></p>
          </div>
          <div id="proofGrid" class="card-grid card-grid-3" role="list" aria-label="Firm resources"></div>
        </div>
      </section>

      <section id="closingCta" class="section section-cta" aria-labelledby="ctaTitle">
        <div class="section-inner section-inner-narrow">
          <div class="cta-panel">
            <p id="ctaEyebrow" class="eyebrow"></p>
            <h2 id="ctaTitle" class="section-title"></h2>
            <p id="ctaBody" class="section-intro"></p>
            <div id="ctaActions" class="hero-actions" aria-label="Closing actions"></div>
          </div>
        </div>
      </section>
    </main>

    <div id="siteFooter"></div>
  </div>

  <script src="./site.js" defer></script>
  <script src="./home.js" defer></script>
</body>
</html>
