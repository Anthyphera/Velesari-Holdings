    <path d="M74 111C83 98 91 95 101 94C95 106 92 113 83 120C76 119 73 116 74 111Z" fill="url(#gold)" opacity="0.92"/>
    <path d="M210 118C217 106 224 101 235 99C233 111 231 118 224 124C216 124 210 122 210 118Z" fill="url(#gold)" opacity="0.92"/>
    <path d="M84 151C103 151 114 160 123 171C103 172 91 166 84 151Z" fill="url(#gold)" opacity="0.92"/>
    <path d="M222 150C238 151 250 159 258 170C241 172 229 167 222 150Z" fill="url(#gold)" opacity="0.92"/>
