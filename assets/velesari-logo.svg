<svg width="820" height="310" viewBox="0 0 820 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Velesari Holdings logo</title>
  <desc id="logoDesc">Gold and emerald lotus crest with VH monogram and Velesari Holdings wordmark.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9EDB2"/>
      <stop offset="0.45" stop-color="#D4B25A"/>
      <stop offset="1" stop-color="#F4DB8D"/>
    </linearGradient>
    <radialGradient id="emerald" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(410 90) rotate(90) scale(170 230)">
