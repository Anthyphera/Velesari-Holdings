    <path d="M155 177C106 196 67 191 26 165C58 128 106 125 155 140V177Z" fill="url(#emerald)" stroke="url(#gold)" stroke-width="5"/>
    <path d="M155 177C204 196 243 191 284 165C252 128 204 125 155 140V177Z" fill="url(#emerald)" stroke="url(#gold)" stroke-width="5"/>

