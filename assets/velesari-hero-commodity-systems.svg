<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Commodity systems panel</title>
  <desc id="desc">A structured systems map linking energy, agriculture, logistics, infrastructure, capital, risk management, trade routes, and storage nodes.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#113426"/>
      <stop offset="100%" stop-color="#081a13"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f3e4bf"/>
      <stop offset="50%" stop-color="#d4b372"/>
      <stop offset="100%" stop-color="#a77935"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#panel)"/>

  <g opacity="0.16" stroke="#c4a76c" stroke-width="1">
    <path d="M80 100h1040M80 180h1040M80 260h1040M80 340h1040M80 420h1040M80 500h1040M80 580h1040M80 660h1040"/>
    <path d="M120 60v640M240 60v640M360 60v640M480 60v640M600 60v640M720 60v640M840 60v640M960 60v640M1080 60v640"/>
  </g>

  <g fill="#0f2a1f" stroke="url(#gold)" stroke-width="2.4">
    <rect x="110" y="120" width="220" height="92" rx="14"/>
    <rect x="110" y="280" width="220" height="92" rx="14"/>
    <rect x="110" y="440" width="220" height="92" rx="14"/>
    <rect x="480" y="120" width="240" height="92" rx="14"/>
    <rect x="480" y="280" width="240" height="92" rx="14"/>
    <rect x="480" y="440" width="240" height="92" rx="14"/>
    <rect x="870" y="170" width="220" height="92" rx="14"/>
    <rect x="870" y="330" width="220" height="92" rx="14"/>
    <rect x="870" y="490" width="220" height="92" rx="14"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="25" letter-spacing="1" fill="#f1e5c8">
    <text x="145" y="173">ENERGY</text>
    <text x="145" y="333">AGRICULTURE</text>
    <text x="145" y="493">INFRASTRUCTURE</text>
    <text x="530" y="173">LOGISTICS</text>
    <text x="530" y="333">TRADE ROUTES</text>
    <text x="530" y="493">STORAGE NODES</text>
    <text x="930" y="223">CAPITAL</text>
    <text x="930" y="383">RISK</text>
    <text x="930" y="543">EXECUTION</text>
  </g>

  <g stroke="url(#gold)" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M330 166h150"/>
    <path d="M330 326h150"/>
    <path d="M330 486h150"/>
    <path d="M720 166h150"/>
    <path d="M720 326h150"/>
    <path d="M720 486h150"/>
    <path d="M600 212v68"/>
    <path d="M600 372v68"/>
    <path d="M600 532v68"/>
    <path d="M220 212v68"/>
    <path d="M220 372v68"/>
  </g>

  <g fill="#d4b372">
    <circle cx="480" cy="166" r="5"/>
    <circle cx="480" cy="326" r="5"/>
    <circle cx="480" cy="486" r="5"/>
    <circle cx="870" cy="166" r="5"/>
    <circle cx="870" cy="326" r="5"/>
    <circle cx="870" cy="486" r="5"/>
    <circle cx="600" cy="280" r="5"/>
    <circle cx="600" cy="440" r="5"/>
  </g>

  <rect x="70" y="60" width="1060" height="640" rx="24" fill="none" stroke="#c7a969" stroke-opacity="0.42"/>
</svg>
